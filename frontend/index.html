<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Recommendation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #f5efe6;
        --card: rgba(255, 252, 247, 0.88);
        --text: #1f1f1f;
        --muted: #66604f;
        --accent: #c86b3c;
        --accent-dark: #8d4320;
        --line: rgba(31, 31, 31, 0.1);
        --shadow: 0 24px 60px rgba(117, 61, 26, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(242, 177, 121, 0.35), transparent 34%),
          radial-gradient(circle at bottom right, rgba(211, 132, 84, 0.28), transparent 30%),
          linear-gradient(145deg, #efe4d4 0%, #f8f4ed 48%, #eee1cf 100%);
      }

      .page {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .hero {
        padding: 36px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-dark);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 64px);
        line-height: 0.95;
      }

      .lead {
        max-width: 680px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .panel {
        margin-top: 22px;
        padding: 24px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.74);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
      }

      input {
        width: 100%;
        border: 1px solid rgba(31, 31, 31, 0.14);
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 16px;
        outline: none;
        background: white;
      }

      input:focus {
        border-color: rgba(200, 107, 60, 0.5);
        box-shadow: 0 0 0 4px rgba(200, 107, 60, 0.12);
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 16px 22px;
        font-size: 16px;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--accent) 0%, #ab4d24 100%);
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease;
        box-shadow: 0 16px 28px rgba(171, 77, 36, 0.22);
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.8;
      }

      .helper {
        margin-top: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .chip {
        border: 1px solid rgba(141, 67, 32, 0.18);
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 247, 240, 0.95);
        color: var(--accent-dark);
        font-size: 14px;
        cursor: pointer;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 20px;
        margin-top: 20px;
      }

      .result,
      .catalog {
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.8);
      }

      .section-title {
        margin: 0 0 16px;
        font-size: 18px;
      }

      .status {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .recommend-list,
      .catalog-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .recommend-item,
      .catalog-item {
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(31, 31, 31, 0.08);
        background: white;
      }

      .recommend-list {
        display: grid;
        gap: 12px;
      }

      .catalog-list {
        display: grid;
        gap: 10px;
      }

      .catalog-item button {
        width: 100%;
        text-align: left;
        color: var(--text);
        background: transparent;
        padding: 0;
        box-shadow: none;
      }

      .catalog-item button:hover {
        transform: none;
      }

      .error {
        color: #b42318;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 20px, 960px);
          padding: 20px 0 28px;
        }

        .hero,
        .panel,
        .result,
        .catalog {
          padding: 18px;
          border-radius: 18px;
        }

        .controls,
        .grid {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useState } = React;

      function App() {
        const [productName, setProductName] = useState("");
        const [products, setProducts] = useState([]);
        const [recommendations, setRecommendations] = useState([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        useEffect(() => {
          fetch("/products/")
            .then((response) => response.json())
            .then((data) => setProducts(data.products || []))
            .catch(() => setProducts([]));
        }, []);

        async function handleSubmit(event) {
          event.preventDefault();
          if (!productName.trim()) {
            setError("Nhap ten san pham truoc khi tim.");
            setRecommendations([]);
            return;
          }

          setLoading(true);
          setError("");

          try {
            const response = await fetch(
              `/recommend/?product_name=${encodeURIComponent(productName)}`
            );
            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.detail || "Khong the lay goi y.");
            }

            setRecommendations(data.recommendations || []);
          } catch (err) {
            setRecommendations([]);
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }

        function selectProduct(name) {
          setProductName(name);
          setError("");
          setRecommendations([]);
        }

        return (
          <main className="page">
            <section className="hero">
              <p className="eyebrow">React Frontend</p>
              <h1>Product recommendation, but usable.</h1>
              <p className="lead">
                Chon nhanh tu danh sach hoac nhap ten san pham. Frontend nay dung
                React de goi API FastAPI o phia sau.
              </p>

              <form className="panel" onSubmit={handleSubmit}>
                <div className="controls">
                  <input
                    value={productName}
                    onChange={(event) => setProductName(event.target.value)}
                    placeholder="Vi du: Ao thun trang"
                  />
                  <button type="submit" disabled={loading}>
                    {loading ? "Dang tim..." : "Lay goi y"}
                  </button>
                </div>

                <p className="helper">
                  Co the nhap khong dau. Vi du: `Ao thun trang`, `Laptop Dell`,
                  `iphone`.
                </p>

                {products.length > 0 && (
                  <div className="chips">
                    {products.slice(0, 4).map((name) => (
                      <button
                        type="button"
                        className="chip"
                        key={name}
                        onClick={() => selectProduct(name)}
                      >
                        {name}
                      </button>
                    ))}
                  </div>
                )}
              </form>

              <div className="grid">
                <section className="result">
                  <h2 className="section-title">Ket qua</h2>
                  {error ? (
                    <p className="status error">{error}</p>
                  ) : recommendations.length > 0 ? (
                    <ul className="recommend-list">
                      {recommendations.map((item) => (
                        <li className="recommend-item" key={item}>
                          {item}
                        </li>
                      ))}
                    </ul>
                  ) : (
                    <p className="status">
                      Chua co ket qua. Chon mot san pham roi bam Lay goi y.
                    </p>
                  )}
                </section>

                <aside className="catalog">
                  <h2 className="section-title">San pham co san</h2>
                  <ul className="catalog-list">
                    {products.map((name) => (
                      <li className="catalog-item" key={name}>
                        <button type="button" onClick={() => selectProduct(name)}>
                          {name}
                        </button>
                      </li>
                    ))}
                  </ul>
                </aside>
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
