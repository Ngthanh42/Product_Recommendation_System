<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Recommendation</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #111111;
      --panel-2: #1a1a1a;
      --text: #f3efe7;
      --muted: #9a9488;
      --accent: #c8f060;
      --line: #2c2c2c;
      --shadow: 0 24px 80px rgba(16, 16, 16, 0.18);
      --radius-lg: 24px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(200, 240, 96, 0.18), transparent 28%),
        linear-gradient(135deg, #f8f4eb 0%, #ece2d1 100%);
      color: #111111;
      padding: 32px 16px;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
    }

    .wrap {
      background: var(--panel);
      color: var(--text);
      border-radius: var(--radius-lg);
      padding: 28px 24px 32px;
      box-shadow: var(--shadow);
    }

    .badge,
    .hero-badge,
    .section-label,
    .rec-label {
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      background: rgba(200, 240, 96, 0.12);
      color: var(--accent);
      border: 1px solid rgba(200, 240, 96, 0.26);
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.02;
      margin-bottom: 10px;
    }

    h1 em {
      color: var(--accent);
      font-style: normal;
    }

    .sub {
      color: var(--muted);
      max-width: 620px;
      font-size: 0.96rem;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    .search-box {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px 14px 12px 38px;
      font-size: 0.94rem;
      outline: none;
    }

    .search-box:focus {
      border-color: rgba(200, 240, 96, 0.45);
    }

    .btn {
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #101010;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.65;
      transform: none;
    }

    .section-label,
    .rec-label {
      font-size: 10px;
      color: #7d776b;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .chip {
      background: var(--panel-2);
      color: #d6d0c6;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.84rem;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .chip:hover,
    .chip.active {
      color: var(--accent);
      border-color: rgba(200, 240, 96, 0.45);
      background: rgba(200, 240, 96, 0.1);
    }

    .status {
      min-height: 24px;
      color: #f1b46d;
      font-size: 0.92rem;
      margin-bottom: 12px;
    }

    .status.error {
      color: #ff908e;
    }

    .results[hidden] {
      display: none;
    }

    .hero-card {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0;
      background: #171717;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .hero-img,
    .result-card-img {
      background:
        linear-gradient(135deg, rgba(200, 240, 96, 0.14), transparent),
        #232323;
    }

    .hero-img img,
    .result-card-img img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .hero-img {
      min-height: 180px;
    }

    .hero-info {
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .hero-badge {
      width: fit-content;
      font-size: 10px;
      color: var(--accent);
      border: 1px solid rgba(200, 240, 96, 0.22);
      background: rgba(200, 240, 96, 0.1);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .hero-name {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .hero-hint {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .result-card {
      background: #171717;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .result-card:hover {
      transform: translateY(-2px);
      border-color: rgba(200, 240, 96, 0.42);
    }

    .result-card-img {
      height: 132px;
    }

    .result-card-body {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .rank {
      font-size: 1.05rem;
      font-weight: 700;
      color: rgba(200, 240, 96, 0.34);
      min-width: 26px;
    }

    .rec-name {
      font-size: 0.92rem;
      line-height: 1.35;
      color: var(--text);
    }

    .placeholder {
      display: grid;
      place-items: center;
      color: #7d776b;
      font-size: 0.88rem;
      height: 100%;
      min-height: 120px;
      text-align: center;
      padding: 12px;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 22px 16px 24px;
      }

      .search-row {
        flex-direction: column;
      }

      .hero-card {
        grid-template-columns: 1fr;
      }

      .hero-img {
        min-height: 220px;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="wrap">
      <div class="badge">AI Recommendation Engine</div>
      <h1>Tim san pham<br><em>danh rieng cho ban</em></h1>
      <p class="sub">Nhap ten san pham ban dang tim. He thong se goi y nhung lua chon tuong tu tu du lieu cua project.</p>

      <div class="search-row">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b3b3b3" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input class="search-box" id="inp" list="productSuggestions" placeholder="Vi du: Ao thun trang, Laptop Dell" autocomplete="off">
          <datalist id="productSuggestions"></datalist>
        </div>
        <button class="btn" id="searchBtn" type="button">Goi y</button>
      </div>

      <div class="status" id="status"></div>

      <div class="section-label">Tat ca san pham</div>
      <div class="chips" id="chips"></div>

      <div class="results" id="results" hidden>
        <div class="hero-card">
          <div class="hero-img" id="heroImgWrap"></div>
          <div class="hero-info">
            <span class="hero-badge">San pham tim kiem</span>
            <div class="hero-name" id="heroName"></div>
            <div class="hero-hint">Nhung san pham tuong tu o ben duoi.</div>
          </div>
        </div>
        <div class="rec-label" id="recLabel"></div>
        <div class="result-grid" id="resultGrid"></div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      products: [],
      displayMap: new Map(),
      imageMap: {
        "ao thun trang": "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800&q=80",
        "ao thun den": "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=800&q=80",
        "quan jean xanh": "https://images.unsplash.com/photo-1542272604-787c3835535d?w=800&q=80",
        "laptop dell": "https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=800&q=80",
        "laptop hp": "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=800&q=80",
        "dien thoai iphone": "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=800&q=80"
      },
      defaultImage: "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=800&q=80"
    };

    const chipsEl = document.getElementById("chips");
    const resultGridEl = document.getElementById("resultGrid");
    const resultsEl = document.getElementById("results");
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("inp");
    const searchBtnEl = document.getElementById("searchBtn");
    const datalistEl = document.getElementById("productSuggestions");

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d");
    }

    function decodeMojibake(value) {
      if (typeof value !== "string" || !/[ÃÂÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖÙÚÛÜÝÞß]/.test(value)) {
        return value || "";
      }

      try {
        const bytes = Uint8Array.from([...value].map((char) => char.charCodeAt(0)));
        return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      } catch {
        return value;
      }
    }

    function displayName(rawName) {
      return state.displayMap.get(rawName) || decodeMojibake(rawName);
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function imageMarkup(name, imageUrl, className) {
      const safeName = displayName(name);
      const finalUrl = imageUrl || state.imageMap[normalizeText(name)] || state.defaultImage;
      return finalUrl
        ? `<img src="${finalUrl}" alt="${safeName}" loading="lazy">`
        : `<div class="placeholder">${safeName}</div>`;
    }

    function findRawProductName(value) {
      const normalizedValue = normalizeText(value);

      if (!normalizedValue) {
        return "";
      }

      const directMatch = state.products.find((product) => normalizeText(product.rawName) === normalizedValue);
      if (directMatch) {
        return directMatch.rawName;
      }

      const displayMatch = state.products.find((product) => normalizeText(product.displayName) === normalizedValue);
      return displayMatch ? displayMatch.rawName : "";
    }

    function renderProducts() {
      chipsEl.innerHTML = "";
      datalistEl.innerHTML = "";

      state.products.forEach((product) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip";
        chip.textContent = product.displayName;
        chip.onclick = () => {
          inputEl.value = product.displayName;
          runSearch(product.rawName);
        };
        chipsEl.appendChild(chip);

        const option = document.createElement("option");
        option.value = product.displayName;
        datalistEl.appendChild(option);
      });
    }

    function markActiveChip(rawName) {
      const display = displayName(rawName);
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.classList.toggle("active", chip.textContent === display);
      });
    }

    async function loadProducts() {
      setStatus("Dang tai danh sach san pham...");
      searchBtnEl.disabled = true;

      const response = await fetch("/products/");
      if (!response.ok) {
        throw new Error("Khong tai duoc danh sach san pham.");
      }

      const data = await response.json();
      state.products = (data.products || []).map((rawName) => {
        const decodedName = decodeMojibake(rawName);
        state.displayMap.set(rawName, decodedName);
        return {
          rawName,
          displayName: decodedName
        };
      });

      renderProducts();
      searchBtnEl.disabled = false;
      setStatus("Chon mot san pham hoac nhap ten de xem goi y.");
    }

    function renderRecommendations(query, recommendations) {
      document.getElementById("heroName").textContent = displayName(query.name);
      document.getElementById("heroImgWrap").innerHTML = imageMarkup(query.name, query.image_url, "hero");
      document.getElementById("recLabel").textContent = `Goi y cho "${displayName(query.name)}"`;

      resultGridEl.innerHTML = "";
      recommendations.forEach((item, index) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "result-card";
        card.innerHTML = `
          <div class="result-card-img">${imageMarkup(item.name, item.image_url, "result")}</div>
          <div class="result-card-body">
            <span class="rank">${String(index + 1).padStart(2, "0")}</span>
            <span class="rec-name">${displayName(item.name)}</span>
          </div>
        `;
        card.onclick = () => {
          inputEl.value = displayName(item.name);
          runSearch(item.name);
        };
        resultGridEl.appendChild(card);
      });

      resultsEl.hidden = false;
      markActiveChip(query.name);
    }

    async function runSearch(forcedRawName = "") {
      const rawName = forcedRawName || findRawProductName(inputEl.value);

      if (!rawName) {
        setStatus("Ten san pham khong hop le. Hay chon mot san pham trong danh sach.", true);
        resultsEl.hidden = true;
        return;
      }

      setStatus("Dang lay goi y...");
      searchBtnEl.disabled = true;

      try {
        const response = await fetch(`/recommend/?product_name=${encodeURIComponent(rawName)}`);
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.detail || "Khong lay duoc goi y.");
        }

        renderRecommendations(payload.recommendations.query, payload.recommendations.recommendations);
        inputEl.value = displayName(payload.recommendations.query.name);
        setStatus(`Da tim thay ${payload.recommendations.recommendations.length} san pham tuong tu.`);
      } catch (error) {
        resultsEl.hidden = true;
        setStatus(error.message || "Da xay ra loi khi goi y.", true);
      } finally {
        searchBtnEl.disabled = false;
      }
    }

    searchBtnEl.addEventListener("click", () => runSearch());
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        runSearch();
      }
    });

    loadProducts().catch((error) => {
      setStatus(error.message || "Khong khoi tao duoc giao dien.", true);
      searchBtnEl.disabled = true;
    });
  </script>
</body>
</html>
